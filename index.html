<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Mulay | Mini Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0d0d0d, #1a1a2e, #2c3e50);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 { color: #ffffff; font-size: 36px;
             margin-bottom: 10px; letter-spacing: 2px; }

        p.subtitle { color: #aaa; font-size: 15px; margin-bottom: 50px; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .card {
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 35px 30px;
            width: 260px;
            text-align: center;
            box-shadow: 6px 6px 16px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 10px 10px 25px rgba(0,0,0,0.6);
        }

        .card .icon { font-size: 48px; margin-bottom: 16px; }

        .card h3 { color: #ffffff; font-size: 20px; margin-bottom: 10px; }

        .card p { color: #888; font-size: 13px;
                  margin-bottom: 24px; line-height: 1.6; }

        .card a {
            display: inline-block;
            background: #fb7c14;
            color: white;
            text-decoration: none;
            padding: 10px 28px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s ease, transform 0.1s;
        }

        .card a:hover { background: #ff9a45; transform: scale(1.05); }

        footer { margin-top: 60px; color: #555; font-size: 13px; }
    </style>
</head>
<body>

    <h1>🚀 My Projects</h1>
    <p class="subtitle">Frontend Web Development | Aditya Mulay</p>

    <div class="container">

        <div class="card">
            <div class="icon">🌐</div>
            <h3>Landing Page</h3>
            <p>A responsive landing page built with HTML, CSS & JavaScript.</p>
            <a href="landing-page/index.html">View Project</a>
        </div>

        <div class="card">
            <div class="icon">👨‍💻</div>
            <h3>Portfolio</h3>
            <p>Personal portfolio showcasing my skills, projects and resume.</p>
            <a href="portfolio/index.html">View Project</a>
        </div>

    </div>

    <footer>© 2026 Aditya Mulay</footer>

</body>
</html>
