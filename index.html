<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aditya Mulay - Mini Projects</title>
  <style>
    body { font-family: Arial; text-align: center;
           background: #0f0f1a; color: white; padding: 50px; }
    h1 { color: #00d4ff; }
    p { color: #aaa; }
    .container { display: flex; flex-wrap: wrap;
                 justify-content: center; gap: 20px; margin-top: 40px; }
    .card { background: #1a1a2e; padding: 30px;
            width: 250px; border-radius: 15px;
            border: 2px solid #00d4ff; transition: transform 0.3s; }
    .card:hover { transform: scale(1.05); }
    .card span { font-size: 40px; }
    .card h3 { color: #00d4ff; margin: 15px 0 5px; }
    .card p { font-size: 13px; color: #aaa; }
    .card a { display: inline-block; margin-top: 15px;
              background: #00d4ff; color: #0f0f1a;
              padding: 10px 25px; border-radius: 20px;
              text-decoration: none; font-weight: bold; }
    .card a:hover { background: white; }
  </style>
</head>
<body>
  <h1>🚀 My Mini Projects</h1>
  <p>Frontend Web Development Projects</p>

  <div class="container">

    <div class="card">
      <span>🌐</span>
      <h3>Landing Page</h3>
      <p>A responsive landing page built with HTML & CSS</p>
      <a href="landing-page/index.html">View Project</a>
    </div>

    <div class="card">
      <span>👨‍💻</span>
      <h3>Portfolio</h3>
      <p>Personal portfolio showcasing my skills and projects</p>
      <a href="portfolio/index.html">View Project</a>
    </div>

  </div>
</body>
</html>
